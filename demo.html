<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spot the Fake Photo - Live Demo</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #eee; text-align: center; padding: 20px; }
  video, canvas { border-radius: 12px; max-width: 90vw; }
  #score { font-size: 48px; font-weight: bold; margin-top: 20px; }
  #label { font-size: 20px; margin-top: 8px; }
  .real { color: #4ade80; }
  .screen { color: #f87171; }
  .bar-wrap { width: 300px; height: 14px; background: #333; border-radius: 7px; margin: 20px auto; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #4ade80, #f87171); width: 0%; transition: width 0.2s; }
</style>
</head>
<body>
  <h2>Spot the Fake Photo - Live Demo</h2>
  <video id="video" autoplay playsinline width="480" height="360"></video>
  <canvas id="canvas" width="480" height="360" style="display:none;"></canvas>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div id="score">-</div>
  <div id="label">Point the camera at something and hold still...</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const labelEl = document.getElementById('label');
const bar = document.getElementById('bar');

navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: "environment"
    }
})
.then(stream => {
    video.srcObject = stream;
});
  .then(stream => { video.srcObject = stream; })
  .catch(err => { labelEl.textContent = 'Camera error: ' + err.message; });

async function captureAndSend() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl })
    });
    const data = await res.json();
    const s = data.score;
    scoreEl.textContent = s.toFixed(2);
    bar.style.width = (s * 100) + '%';
    if (s < 0.5) {
      scoreEl.className = 'real';
      labelEl.textContent = 'Looks like a REAL photo';
    } else {
      scoreEl.className = 'screen';
      labelEl.textContent = 'Looks like a PHOTO OF A SCREEN';
    }
  } catch (e) {
    labelEl.textContent = 'Error: ' + e.message;
  }
}

setInterval(captureAndSend, 700);
</script>
</body>
</html>
